name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev
        env:
          UV_INDEX_PYTORCH_CU126_URL: "https://download.pytorch.org/whl/cpu"

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ scripts/

      - name: Test
        run: uv run pytest tests/ -v

  smoke-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync
        env:
          UV_INDEX_PYTORCH_CU126_URL: "https://download.pytorch.org/whl/cpu"

      - name: Generate smoke dataset (50 cases)
        run: uv run python scripts/generate_heat2d_dataset.py --config configs/heat2d_smoke.yaml