normalisation:
  t_scale: 200.0
  alpha_min: 0.005
  alpha_max: 0.05
  t_max: 30.0

fno:
  n_modes: [12, 12]
  hidden_channels: 32
  n_layers: 4
  in_channels: 5
  out_channels: 1

deeponet:
  param_dim: 7
  p: 128
  width: 256
  depth: 3

training:
  epochs: 200
  lr: 1.0e-3
  weight_decay: 1.0e-4
  val_every: 10
  fno_batch: 8        # reduce to 4 if GPU OOM; increase to 64 for CPU
  don_batch: 128
  eval_batch: 16      # reduce for smaller GPUs

dataset:
  n_cases: 5000
  seed: 42
  n_workers: null     # null → os.cpu_count()
  split: [0.70, 0.15, 0.15]